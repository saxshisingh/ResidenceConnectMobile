workflows:
  ios-release:
    name: iOS Release Build

    max_build_duration: 120

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.residenceconnect.myapp

      vars:
        XCODE_WORKSPACE: "MyGate.xcworkspace"
        XCODE_SCHEME: "MyGate"

      node: latest
      xcode: latest
      cocoapods: default

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Install CocoaPods
        script: |
          cd ios
          pod install

      - name: Set up code signing
        script: |
          cd ios
          xcode-project use-profiles

      - name: Verify workspace
        script: |
          ls ios

      - name: Build IPA
        script: |
          cd ios
          xcode-project build-ipa \
            --workspace "MyGate.xcworkspace" \
            --scheme "MyGate"

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      email:
        recipients:
          - your-email@gmail.com