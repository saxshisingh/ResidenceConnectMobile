workflows:
  ios-release:
    name: iOS Release Build

    max_build_duration: 120

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.residenceconnect.myapp

      vars:
        XCODE_WORKSPACE: "MyGate.xcworkspace"
        XCODE_SCHEME: "MyGate"

      node: latest
      xcode: 16.2
      cocoapods: default

    integrations:
      app_store_connect: Codemagic Key

    scripts:

      - name: Install dependencies
        script: |
          npm install

      - name: Install CocoaPods
        script: |
          cd ios
          rm -rf Pods Podfile.lock
          pod install --repo-update

      - name: Verify workspace
        script: |
          ls ios

      - name: Set up code signing
        script: |
          cd ios
          xcode-project use-profiles

      - name: Build IPA
        script: |
          cd ios
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --archive-xcargs "IPHONEOS_DEPLOYMENT_TARGET=15.1"

    artifacts:
      - ios/build/ios/ipa/*.ipa
      - ios/build/ios/xcarchive/*.xcarchive

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal Testers

      email:
        recipients:
          - your-email@gmail.com